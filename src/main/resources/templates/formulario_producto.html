<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Añadir Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container shadow p-4 bg-white rounded" style="max-width: 600px;">
        <h3 class="mb-4 text-center" style="color: #f39c12;">Registrar Nuevo Producto</h3>
        
        <form th:action="@{/inventario/guardar}" th:object="${producto}" method="post">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del Producto:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descripción:</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="2"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Precio (S/):</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Stock Inicial:</label>
                    <input type="number" th:field="*{stock}" class="form-control" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Categoría:</label>
                <select th:field="*{categoria}" class="form-select">
                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                </select>
            </div>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn text-white fw-bold" style="background-color: #f39c12;">Guardar Producto</button>
            </div>
            <div class="text-center mt-3">
                <a th:href="@{/inventario}" class="text-decoration-none text-muted">Cancelar y volver</a>
            </div>
        </form>
    </div>
</body>
</html>
