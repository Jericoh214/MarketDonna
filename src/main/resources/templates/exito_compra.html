<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Market Donna - Compra Exitosa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-marfil: #FDFBF7;
            --text-pino: #1E4636;
            --brand-naranja: #E87A33;
        }
        body { 
            background-color: var(--bg-marfil); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-pino);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background-color: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 30px rgba(30, 70, 54, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .icon-circle {
            width: 90px;
            height: 90px;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1.5rem auto;
        }
        .btn-naranja { 
            background-color: var(--brand-naranja); 
            color: white; 
            border: none; 
            font-weight: bold;
        }
        .btn-naranja:hover { 
            background-color: #d66b2a; 
            color: white; 
        }
        .btn-outline-pino {
            color: var(--text-pino);
            border: 2px solid var(--text-pino);
            font-weight: bold;
        }
        .btn-outline-pino:hover {
            background-color: var(--text-pino);
            color: white;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">
            <i class="fa-solid fa-check"></i>
        </div>
        
        <h2 class="fw-bold mb-3">¡Gracias por tu compra!</h2>
        <p class="text-muted mb-4">
            Tu pedido ha sido procesado correctamente. Estamos preparando tus productos frescos para que lleguen a tu hogar lo antes posible.
        </p>
        
        <div class="p-3 mb-4 rounded" style="background-color: var(--bg-marfil); border: 1px dashed #c8d4ce;">
            <p class="mb-1 small text-muted">Número de Pedido</p>
            <h5 class="fw-bold mb-0" th:text="${numeroPedido}">#MD-00000</h5>
        </div>

        <div class="d-grid gap-3">
            <a th:href="@{/comprobante}" class="btn btn-naranja rounded-pill py-2 shadow-sm">
                <i class="fa-solid fa-file-invoice me-2"></i> Ver Comprobante
            </a>
            
            <a th:href="@{/}" class="btn btn-outline-pino rounded-pill py-2">
                Seguir Comprando
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
