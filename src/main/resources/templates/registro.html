<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Market Donna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Fondo a pantalla completa con imagen del supermercado */
        body {
            background: url('/img/fondos/registro-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        /* Panel central de registro */
        .registro-card {
            background-color: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 550px;
            padding: 2.5rem 3rem;
        }

        /* Logo superior */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-container img {
            max-width: 200px;
            display: block;
            margin: 0 auto;
        }

        /* Campos de formulario limpios (estilo Material) */
        .form-floating-custom {
            margin-bottom: 1.2rem;
        }
        .form-floating-custom label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.3rem;
            display: block;
        }
        .form-control-custom {
            border: none;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
            padding: 8px 0;
            width: 100%;
            background-color: transparent;
            transition: border-color 0.3s;
        }
        .form-control-custom:focus {
            outline: none;
            border-bottom: 2px solid #f39c12;
        }

        /* Layout para el Celular y Documento */
        .input-group-custom {
            display: flex;
            gap: 10px;
        }
        
        /* Lista de validación de contraseña */
        .password-rules {
            font-size: 0.75rem;
            color: #666;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }
        .password-rules li {
            list-style-type: disc;
            margin-left: 15px;
        }

        /* Checkboxes */
        .form-check-label {
            font-size: 0.8rem;
            color: #444;
        }

        /* Botón de Registro */
        .btn-registro {
            background-color: #f8f9fa;
            color: #a0a0a0; /* Empieza gris/inactivo visualmente */
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .btn-registro:hover {
            background-color: #f39c12;
            color: white;
            border-color: #f39c12;
        }

        .login-link {
            font-size: 0.85rem;
            color: #555;
            text-decoration: none;
        }
        .login-link a {
            color: #f39c12;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="registro-card">
        
        <div class="logo-container text-center">
            <img th:src="@{/img/logo.png}" alt="Market Donna Logo">
        </div>

        <form th:action="@{/registro/guardar}" method="post">
            
            <div class="form-floating-custom">
                <label>Correo</label>
                <input type="email" name="email" class="form-control-custom" placeholder="Ingresa un correo" required>
            </div>

            <div class="form-floating-custom">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control-custom" placeholder="Ingresa un nombre" required>
            </div>

            <div class="form-floating-custom">
                <label>Apellidos</label>
                <input type="text" name="apellidos" class="form-control-custom" placeholder="Ingresa apellidos" required>
            </div>

            <div class="form-floating-custom">
                <label>Tipo de documento</label>
                <div class="input-group-custom">
                    <select name="tipoDocumento" class="form-control-custom" style="width: 25%;">
                        <option value="DNI">DNI</option>
                        <option value="CE">CE</option>
                        <option value="PASAPORTE">PAS</option>
                    </select>
                    <input type="text" name="numeroDocumento" class="form-control-custom" placeholder="Ingresa un documento de identidad" style="width: 75%;" required>
                </div>
            </div>

            <div class="form-floating-custom">
                <label>Celular</label>
                <div class="input-group-custom">
                    <span style="padding: 8px 0; font-weight: bold; color: #555;">+51</span>
                    <input type="text" name="celular" class="form-control-custom" placeholder="Ingresa un celular" required>
                </div>
            </div>

            <div class="form-floating-custom position-relative">
                <label>Contraseña</label>
                <input type="password" id="passwordField" name="password" class="form-control-custom" placeholder="Ingresa una contraseña" required>
                <i class="bi bi-eye-slash position-absolute" id="togglePassword" style="right: 5px; top: 30px; cursor: pointer; color: #666;"></i>
                
                <ul class="password-rules">
                    <li>Mín. 8 caracteres</li>
                    <li>1 número</li>
                    <li>1 mayúscula</li>
                    <li>1 minúscula</li>
                    <li>Sin espacio</li>
                    <li>Sin usar %/&...</li>
                </ul>
            </div>

            <div class="mt-4 mb-2 form-check">
                <input type="checkbox" class="form-check-input" id="checkPuntos" required>
                <label class="form-check-label" for="checkPuntos">Acepto los <a href="#" class="text-dark">términos y condiciones</a> para acumular Donna Puntos en mis compras.</label>
            </div>
            
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="checkTyC" required>
                <label class="form-check-label" for="checkTyC">Acepto los <a href="#" class="text-dark">términos y condiciones</a> de marketdonna.com</label>
            </div>

            <button type="submit" class="btn btn-registro mt-2">Regístrate</button>
            
            <div class="text-center mt-3 login-link">
                ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
            </div>
        </form>

    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordField');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
