<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bandeja de Pedidos - Market Donna</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Colores de marca */
        .text-brand { color: #f39c12; }
        .bg-brand { background-color: #f39c12; color: white; border: none; }
        .bg-brand:hover { background-color: #e67e22; color: white; }
        
        /* Sidebar y navegación */
        .sidebar-card { border-radius: 12px; border: 1px solid #eaeaea; }
        .nav-link-custom { color: #495057; font-weight: 500; padding: 12px 20px; border-radius: 8px; transition: 0.2s; }
        .nav-link-custom:hover { background-color: #f1f3f5; color: #333; }
        .nav-link-custom.active { background-color: #fef5e7; color: #f39c12; font-weight: 600; }
        
        /* Badges de Estado */
        .badge-estado { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; background-color: transparent;}
        .badge-pendiente { color: #f39c12; border: 1px solid #f39c12; }
        .badge-confirmado { color: #2ecc71; border: 1px solid #2ecc71; }
        
        .table th { font-weight: 500; color: #6c757d; border-bottom-width: 1px; }
        .table td { vertical-align: middle; }
    </style>
</head>
<body>

    <!-- NAVBAR SUPERIOR -->
    <nav class="navbar navbar-light bg-white border-bottom px-4 py-3 shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
                <i class="fa-solid fa-store text-brand fs-4 me-2"></i> Market Donna
            </a>
            
            <!-- Buscador general bloqueado visualmente para dar contexto de Admin -->
            <div class="mx-auto d-none d-lg-block" style="width: 40%;">
                <div class="input-group opacity-50">
                    <span class="input-group-text bg-light border-0 rounded-start-pill"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" class="form-control bg-light border-0 rounded-end-pill py-2" placeholder="Buscar productos, marcas y más..." disabled>
                </div>
            </div>

            <div class="d-flex align-items-center gap-4">
                <button class="btn bg-brand fw-bold rounded-pill px-4 shadow-sm"><i class="fa-regular fa-user me-2"></i>ADMIN</button>
                <span class="text-muted fw-semibold small">Admin Panel</span>
            </div>
        </div>
    </nav>

    <!-- LAYOUT PRINCIPAL -->
    <div class="container-fluid mt-4 px-lg-5">
        <div class="row">
            
            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 mb-4">
                <div class="card sidebar-card bg-white shadow-sm p-2">
                    <div class="p-3 mb-2">
                        <span class="fw-bold text-dark"><i class="fa-solid fa-border-all me-2 text-brand"></i>Admin Panel</span>
                    </div>
                    <ul class="nav flex-column gap-1">
                        <!-- Bandeja de Pedidos (ACTIVA) -->
                        <li class="nav-item">
                            <a class="nav-link nav-link-custom active d-flex align-items-center" th:href="@{/admin/pedidos}">
                                <i class="fa-solid fa-inbox me-3"></i> Bandeja de Pedidos
                            </a>
                        </li>
                        <!-- Inventario (INACTIVA) -->
                        <li class="nav-item">
                            <a class="nav-link nav-link-custom d-flex align-items-center" th:href="@{/inventario}">
                                <i class="fa-solid fa-box me-3 text-muted"></i> Inventario
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- CONTENIDO DE LA BANDEJA -->
            <main class="col-md-9 col-lg-10">
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">Bandeja de Pedidos</h2>
                        <p class="text-muted mb-0">Gestiona los pedidos entrantes.</p>
                    </div>
                    
                    <!-- Filtros Superiores -->
                    <div class="d-flex gap-3">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Buscar por ID...">
                        </div>
                        <select class="form-select shadow-sm" style="min-width: 180px;">
                            <option selected><i class="fa-solid fa-filter"></i> Todos los estados</option>
                            <option value="PENDIENTE">Pendientes</option>
                            <option value="CONFIRMADO">Confirmados</option>
                        </select>
                    </div>
                </div>

                <!-- TABLA DE PEDIDOS -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">ID Pedido</th>
                                    <th class="py-3">Cliente</th>
                                    <th class="py-3">Fecha/Hora</th>
                                    <th class="py-3">Total</th>
                                    <th class="py-3 text-center">Estado</th>
                                    <th class="py-3 text-end pe-4">Acción Rápida</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Si no hay pedidos -->
                                <tr th:if="${#lists.isEmpty(pedidos)}">
                                    <td colspan="6" class="text-center py-5 text-muted">La bandeja está vacía.</td>
                                </tr>

                                <!-- Bucle de pedidos -->
                                <tr th:each="pedido : ${pedidos}">
                                    <td class="ps-4 fw-bold text-dark" th:text="'ORD-' + ${pedido.id}">ORD-1001</td>
                                    <td class="fw-medium text-dark" th:text="${pedido.usuario != null ? pedido.usuario.nombreCompleto : 'Cliente Local'}">María González</td>
                                    <td class="text-muted" th:text="${#temporals.format(pedido.fechaPedido, 'yyyy-MM-dd HH:mm')}">2026-06-19 10:30</td>
                                    <td class="fw-bold text-dark" th:text="'$ ' + ${#numbers.formatDecimal(pedido.total, 1, 2)}">$15.40</td>
                                    
                                    <!-- Lógica Visual del ESTADO -->
                                    <td class="text-center">
                                        <span th:if="${pedido.estado.name() == 'PENDIENTE'}" class="badge-estado badge-pendiente"><i class="fa-regular fa-clock me-1"></i>[PENDIENTE]</span>
                                        <span th:if="${pedido.estado.name() == 'CONFIRMADO'}" class="badge-estado badge-confirmado"><i class="fa-solid fa-check me-1"></i>[CONFIRMADO]</span>
                                    </td>

                                    <!-- Lógica Visual de BOTONES -->
                                    <td class="text-end pe-4">
                                        <!-- Botón Aprobar si está pendiente -->
                                        <form th:if="${pedido.estado.name() == 'PENDIENTE'}" th:action="@{/admin/pedidos/aprobar/{id}(id=${pedido.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn bg-brand btn-sm fw-bold rounded-pill px-3 shadow-sm">
                                                <i class="fa-regular fa-circle-check me-1"></i> Aprobar y Descontar
                                            </button>
                                        </form>
                                        
                                        <!-- Botón Ver Detalles si ya está confirmado -->
                                        <a th:if="${pedido.estado.name() == 'CONFIRMADO'}" th:href="@{/admin/pedidos/{id}(id=${pedido.id})}" class="btn btn-light btn-sm fw-bold border rounded-pill px-3 shadow-sm text-secondary">
                                            <i class="fa-regular fa-eye me-1"></i> Ver Detalle
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
