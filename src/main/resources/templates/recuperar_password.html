<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - Market Donna</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (Para el candado) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Fondo a pantalla completa con imagen del supermercado */
        body {
            background: url('/img/fondos/registro-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 15px;
        }

        /* Contenedor principal que agrupa el logo y la tarjeta */
        .recovery-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo de Market Donna */
        .logo-container {
            background-color: white;
            padding: 15px 40px;
            border-radius: 8px 8px 0 0; /* Bordes redondeados solo arriba */
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 2;
        }
        .logo-container img {
            max-width: 220px;
        }

        /* Panel central de recuperación */
        .recovery-card {
            background-color: white;
            border-radius: 0 0 12px 12px; /* Bordes redondeados solo abajo */
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 100%;
            padding: 2.5rem 3.5rem;
            z-index: 1;
        }

        /* Estilos del título e ícono */
        .recovery-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #212529;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .recovery-title i {
            color: #adb5bd;
            font-size: 1.2rem;
        }

        .recovery-text {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        /* Campo de formulario limpio (estilo Material) */
        .form-floating-custom {
            margin-bottom: 2rem;
        }
        .form-floating-custom label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #212529;
            margin-bottom: 0.5rem;
            display: block;
        }
        .form-control-custom {
            border: none;
            border-bottom: 1px solid #ced4da;
            border-radius: 0;
            padding: 8px 0;
            width: 100%;
            background-color: transparent;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }
        .form-control-custom:focus {
            outline: none;
            border-bottom: 2px solid #343a40;
        }
        .form-control-custom::placeholder {
            color: #adb5bd;
        }

        /* Botón Continuar (Gris Oscuro/Pizarra) */
        .btn-continuar {
            background-color: #343a40;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 500;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }
        .btn-continuar:hover {
            background-color: #212529;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Enlace inferior */
        .codigo-link {
            text-align: center;
        }
        .codigo-link a {
            font-size: 0.85rem;
            color: #888;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .codigo-link a:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="recovery-wrapper">
        
        <!-- Contenedor del Logo (Simulando el encabezado blanco) -->
        <div class="logo-container">
            <img th:src="@{/img/logo.png}" alt="Market Donna Logo">
        </div>

        <!-- Tarjeta de Recuperación -->
        <div class="recovery-card">
            
            <h2 class="recovery-title">
                <i class="bi bi-lock"></i> Restablecer contraseña
            </h2>
            
            <p class="recovery-text">
                Ingresa tu correo electrónico y te enviaremos las instrucciones para una nueva contraseña.
            </p>

            <form th:action="@{/recuperar-password/enviar}" method="post">
                
                <div class="form-floating-custom">
                    <label>Correo electrónico</label>
                    <input type="email" name="email" class="form-control-custom" placeholder="Ingresa tu correo electrónico" required>
                </div>

                <button type="submit" class="btn btn-continuar">Continuar</button>
                
                <div class="codigo-link">
                    <a th:href="@{/ingresar-codigo}">Ya tengo el código verificador</a>
                </div>
                
            </form>

        </div>
    </div>

</body>
</html>
